<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الجبري حميد | Al-Jabri Hamid</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:#000;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* خلفية برمجة */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* المحتوى */
.content{
  position:relative;
  z-index:1;
  padding:20px;
  background:rgba(0,0,0,0.6);
  min-height:100vh;
}

/* ترحيب */
.welcome{
  font-size:24px;
  margin-top:15px;
  animation:fade 3s infinite;
}

@keyframes fade{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

/* الاسم */
.name{
  font-family:'Amiri', serif;
  font-size:60px;
  color:#8B5A2B;
}

.name-en{
  border:2px solid white;
  display:inline-block;
  padding:6px 15px;
  border-radius:10px;
  margin-top:5px;
}

/* المشاريع */
.box{
  margin:10px auto;
  padding:12px;
  width:92%;
  max-width:650px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.03);
}

/* ألوان */
.blue{color:#00aaff;font-weight:bold;}
.green{color:#00ff66;font-weight:bold;}
.red{color:#ff4444;font-weight:bold;}
.purple{color:#cc66ff;font-weight:bold;}
.gold{color:#ffd700;font-weight:bold;}
.orange{color:#ff8800;font-weight:bold;}
.cyan{color:#00ffff;font-weight:bold;}
.pink{color:#ff4ecd;font-weight:bold;}
.lime{color:#aaff00;font-weight:bold;}

/* إنجليزي */
.en{
  display:block;
  font-size:13px;
  color:#ffd700;
}

/* زر واتساب */
.btn{
  display:inline-block;
  margin:25px;
  padding:14px 25px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  font-size:18px;
  background:linear-gradient(270deg,#25D366,#00c6ff,#ffcc00,#ff4ecd);
  background-size:400% 400%;
  animation:btn 5s linear infinite;
  position:relative;
  z-index:10;
}

@keyframes btn{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* زوار */
.visitors{
  margin-top:10px;
}

/* رقم */
.phone{
  color:#00ff66;
  margin-top:10px;
}

/* footer */
footer{
  margin-top:20px;
  font-size:12px;
  color:#aaa;
}

</style>
</head>

<!-- خلفية برمجة -->
<canvas id="
