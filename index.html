<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الجبري حميد | Al-Jabri Hamid</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:black;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* 🎯 خلفية البرمجة (Matrix Effect) */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* طبقة الموقع */
.content{
  position:relative;
  z-index:1;
  padding:20px;
  background:rgba(0,0,0,0.6);
  min-height:100vh;
}

/* ترحيب */
.welcome{
  font-size:24px;
  margin-top:15px;
  animation:fade 3s infinite;
}

@keyframes fade{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

/* الاسم */
.name{
  font-family:'Amiri', serif;
  font-size:60px;
  color:#8B5A2B;
}

.name-en{
  border:2px solid white;
  display:inline-block;
  padding:6px 15px;
  border-radius:10px;
  margin-top:5px;
}

/* المشاريع */
.box{
  margin:10px auto;
  padding:12px;
  width:92%;
  max-width:650px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.03);
}

/* ألوان */
.blue{color:#00aaff;font-weight:bold;}
.green{color:#00ff66;font-weight:bold;}
.red{color:#ff4444;font-weight:bold;}
.purple{color:#cc66ff;font-weight:bold;}
.gold{color:#ffd700;font-weight:bold;}
.orange{color:#ff8800;font-weight:bold;}
.cyan{color:#00ffff;font-weight:bold;}
.lime{color:#aaff00;font-weight:bold;}

/* إنجليزي */
.en{
  display:block;
  font-size:13px;
  color:#ffd700;
}

/* زر */
.btn{
  display:inline-block;
  margin:20px;
  padding:14px 25px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  background:linear-gradient(270deg,#25D366,#00c6ff,#ffcc00,#ff4ecd);
}

/* زوار */
.visitors{margin-top:10px;}

</style>
</head>

<body>

<!-- 🎯 خلفية البرمجة -->
<canvas id="matrix"></canvas>

<div class="content">

<div class="welcome">👋 مرحباً بك في موقعي</div>

<div class="name">الجبري حميد</div>
<div class="name-en">Al-Jabri Hamid</div>

<div class="box blue">✔️ تصميم بوستات<span class="en">Post Design</span></div>
<div class="box green">✔️ فيديو + مواقع<span class="en">Video & Websites</span></div>
<div class="box red">✔️ صفحات هبوط<span class="en">Landing Pages</span></div>
<div class="box purple">✔️ تسويق رقمي<span class="en">Digital Marketing</span></div>
<div class="box gold">✔️ محتوى ومقالات<span class="en">Content Writing</span></div>
<div class="box lime">✔️ خدمات واتساب<span class="en">WhatsApp Services</span></div>

<a class="btn" href="https://wa.me/773488133">💬 واتساب</a>

</div>

<script>

/* 🎯 Matrix Code Background */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*()*&^%";
letters = letters.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let x=0;x<columns;x++){
  drops[x]=1;
}

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00ff66";
  ctx.font = fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
      drops[i]=0;
    }
    drops[i]++;
  }
}

setInterval(draw,33);

</script>

</body>
</html>
