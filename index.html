<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الجبري حميد | Al-Jabri Hamid</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Cairo', sans-serif;
  color:white;
  text-align:center;
  background:#000;
  overflow-x:hidden;
}

/* خلفية متحركة احترافية */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
  background:linear-gradient(120deg,#000,#0a0a0a,#000);
  overflow:hidden;
}

.bg span{
  position:absolute;
  width:18px;
  height:18px;
  background:rgba(0,255,120,0.15);
  bottom:-150px;
  animation:float 12s linear infinite;
  border-radius:4px;
}

@keyframes float{
  0%{transform:translateY(0) rotate(0deg); opacity:1;}
  100%{transform:translateY(-1200px) rotate(720deg); opacity:0;}
}

/* ترحيب */
.welcome{
  font-size:22px;
  margin-top:15px;
  animation:fade 3s infinite;
}

@keyframes fade{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

/* الاسم */
.name{
  font-family:'Amiri', serif;
  font-size:60px;
  color:#8B5A2B;
  margin-top:10px;
}

.name-en{
  border:2px solid #fff;
  display:inline-block;
  padding:6px 15px;
  margin-top:5px;
  border-radius:10px;
}

/* صندوق الخدمات */
.box{
  margin:10px auto;
  padding:12px;
  width:92%;
  max-width:650px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(0,255,120,0.2);
}

/* ألوان المشاريع */
.blue{color:#00aaff;font-weight:bold;}
.green{color:#00ff66;font-weight:bold;}
.red{color:#ff4444;font-weight:bold;}
.purple{color:#cc66ff;font-weight:bold;}
.gold{color:#ffd700;font-weight:bold;}
.gray{color:#ffffff;font-weight:bold;}
.orange{color:#ff8800;font-weight:bold;}
.pink{color:#ff4ecd;font-weight:bold;}
.cyan{color:#00ffff;font-weight:bold;}
.lime{color:#aaff00;font-weight:bold;}

/* إنجليزي تحت */
.en{
  display:block;
  font-size:13px;
  color:#ffd700;
  margin-top:4px;
}

/* واتساب */
.btn{
  display:inline-block;
  margin:25px;
  padding:14px 25px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  font-size:18px;
  background:linear-gradient(270deg,#25D366,#00c6ff,#ffcc00,#ff4ecd);
  background-size:400% 400%;
  animation:btn 5s linear infinite;
}

@keyframes btn{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* زوار */
.visitors{
  margin-top:10px;
}

/* رقم */
.phone{
  color:#00ff66;
  margin-top:10px;
}

/* footer */
footer{
  margin-top:20px;
  font-size:12px;
  color:#aaa;
}

</style>
</head>

<body>

<!-- خلفية -->
<div class="bg">
  <span style="left:5%;animation-delay:0s;"></span>
  <span style="left:10%;animation-delay:2s;"></span>
  <span style="left:20%;animation-delay:4s;"></span>
  <span style="left:30%;animation-delay:1s;"></span>
  <span style="left:40%;animation-delay:3s;"></span>
  <span style="left:50%;animation-delay:5s;"></span>
  <span style="left:60%;animation-delay:2s;"></span>
  <span style="left:70%;animation-delay:4s;"></span>
  <span style="left:80%;animation-delay:1s;"></span
