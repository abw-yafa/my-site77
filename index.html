/* الهيدر */
header{

/* الأقسام */
.container{

}

.section{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
  transition:0.3s;
}

.section:hover{

}

/* ألوان */
.blue{color:#00aaff;}
.green{color:#00ff66;}

  color:white;
  font-size:18px;

  background:linear-gradient(270deg,#25D366,#00c6ff,#ff4ecd,#ffcc00);
  background-size:800% 800%;
  animation:move 5s infinite linear, glow 1.5s infinite alternate;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

@keyframes glow{
  from{box-shadow:0 0 5px white;}
  to{box-shadow:0 0 25px white;}
}

/* رقم */
.phone{
  text-align:center;
  color:#00ff66;
  margin-bottom:30px;
}

footer{
  text-align:center;
  padding:15px;
